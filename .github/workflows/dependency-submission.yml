name: Dependency Submission with PURLs

on:
  push:
  pull_request:
  pull_request_target:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit-purls:
    runs-on: ubuntu-latest
    steps:
      - name: Submit npm PURLs
        uses: elrayle/purls-submission-action@main
        with:
          manifest-name: npm
          manifest-path: package-lock.json
          purls: |-
            pkg:npm/lodash@4.17.21
            pkg:npm/express@4.18.2
            pkg:npm/react@1.1.1
            pkg:npm/react@18.2.0
            pkg:npm/fooble@1.2.3

